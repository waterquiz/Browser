<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f1a;
      color: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    /* ── LOGO ── */
    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span {
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      display: flex;
      align-items: center;
      background: #111827;
      border: 1px solid #1f2d45;
      border-radius: 999px;
      padding: 0 20px;
      width: 480px;
      max-width: 90vw;
      height: 52px;
      gap: 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }
    .search-wrap svg { color: #475569; flex-shrink: 0; }

    #urlInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #f1f5f9;
      font-size: 15px;
      font-family: inherit;
    }
    #urlInput::placeholder { color: #475569; }

    #goBtn {
      background: #3b82f6;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      padding: 7px 18px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      white-space: nowrap;
    }
    #goBtn:hover { background: #2563eb; }

    /* ── QUICK LINKS ── */
    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 520px;
    }

    .link-btn {
      background: #111827;
      border: 1px solid #1f2d45;
      border-radius: 10px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, color .15s, transform .15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .link-btn:hover {
      border-color: #3b82f6;
      color: #f1f5f9;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="logo">⚽ <span>Sports Browser</span></div>

  <!-- Search / URL bar -->
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="urlInput" type="text" placeholder="Search or enter a URL…" autocomplete="off"
      onkeydown="if(event.key==='Enter') go()" autofocus />
    <button id="goBtn" onclick="go()">Go</button>
  </div>

  <!-- Quick launch -->
  <div class="links">
    <button class="link-btn" onclick="open('https://www.livescore.com','_blank')">🟢 LiveScore</button>
    <button class="link-btn" onclick="open('https://www.sofascore.com','_blank')">🔵 SofaScore</button>
    <button class="link-btn" onclick="open('https://www.flashscore.com','_blank')">⚡ FlashScore</button>
    <button class="link-btn" onclick="open('https://www.espn.com','_blank')">🔴 ESPN</button>
    <button class="link-btn" onclick="open('https://www.skysports.com','_blank')">🔷 Sky Sports</button>
    <button class="link-btn" onclick="open('https://onefootball.com','_blank')">🟠 OneFootball</button>
  </div>

  <script>
    function go() {
      let val = document.getElementById('urlInput').value.trim();
      if (!val) return;
      if (!val.startsWith('http://') && !val.startsWith('https://')) {
        val = val.includes('.') ? 'https://' + val
          : 'https://www.google.com/search?q=' + encodeURIComponent(val + ' sport');
      }
      window.open(val, '_blank');
    }
  </script>

</body>
</html>
